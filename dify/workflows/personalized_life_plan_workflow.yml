    - data:
        code: |
          import json
          import re

          REQUIRED_FIELDS = [
              "plan_title",
              "user_id",
              "plan_days",
              "risk_summary",
              "diet_plan",
              "exercise_plan",
              "work_rest_plan",
              "daily_schedule",
              "checkin_tasks",
              "health_tips",
              "medical_warning",
              "summary",
          ]

          DEFAULT_WARNING = "AI 生成内容仅用于健康管理参考，不能替代线下医生诊断或治疗。若血糖、血压持续异常或出现明显不适，请及时线下就医。"

          def _strip_to_json(text):
              text = str(text or "").strip()
              text = re.sub(r"^```(?:json)?", "", text, flags=re.IGNORECASE).strip()
              text = re.sub(r"```$", "", text).strip()
              start = text.find("{")
              end = text.rfind("}")
              if start >= 0 and end > start:
                  return text[start:end + 1]
              return text

          def _ensure_list(value):
              if isinstance(value, list):
                  return value
              if value in [None, ""]:
                  return []
              return [str(value)]

          def _is_blank(value):
              if value is None:
                  return True
              if isinstance(value, str):
                  return not value.strip()
              if isinstance(value, (list, dict)):
                  return len(value) == 0
              return False

          def _text(value):
              return str(value or "").strip()

          def _has_text(value):
              return bool(_text(value))

          def _normalize_checkin_tasks(value):
              tasks = _ensure_list(value)
              normalized = []
              for item in tasks:
                  if not isinstance(item, dict):
                      continue
                  task_type = _text(item.get("task_type"))
                  task_name = _text(item.get("task_name"))
                  description = _text(item.get("description"))
                  default_status = _text(item.get("default_status")) or "未完成"

                  if not task_type:
                      raw_id = _text(item.get("task_id")).lower()
                      raw_name = task_name
                      if "exercise" in raw_id or "运动" in raw_name:
                          task_type = "exercise"
                      elif "diet" in raw_id or "早餐" in raw_name or "午餐" in raw_name or "晚餐" in raw_name or "饮食" in raw_name:
                          task_type = "diet"
                      elif "glucose" in raw_id or "血糖" in raw_name:
                          task_type = "glucose_monitoring"
                      else:
                          task_type = "diet"

                  if not task_name:
                      task_name = "运动打卡" if task_type == "exercise" else "饮食打卡"
                  if not description:
                      description = "记录今日是否完成推荐任务"

                  normalized.append({
                      "task_type": task_type,
                      "task_name": task_name,
                      "description": description,
                      "default_status": default_status
                  })

              if not normalized:
                  normalized = [
                      {
                          "task_type": "diet",
                          "task_name": "饮食打卡",
                          "description": "记录今日饮食是否符合控糖方案",
                          "default_status": "未完成"
                      },
                      {
                          "task_type": "exercise",
                          "task_name": "运动打卡",
                          "description": "记录今日是否完成推荐运动",
                          "default_status": "未完成"
                      }
                  ]
              return normalized

          def _normalize_aliases(plan):
              if "diet_plan" not in plan and "diet_principle" in plan:
                  text = _text(plan.get("diet_principle"))
                  plan["diet_plan"] = {
                      "breakfast": "早餐遵循控糖饮食原则，选择全谷物主食、优质蛋白和蔬菜搭配。",
                      "lunch": "午餐遵循控糖饮食原则，控制主食分量，搭配鱼禽蛋豆和充足蔬菜。",
                      "dinner": "晚餐遵循控糖饮食原则，清淡少油，避免过量主食和夜间加餐。",
                      "snack": "加餐优先选择无糖酸奶、低糖水果或少量原味坚果。",
                      "avoid_foods": ["含糖饮料", "甜点", "油炸食品", "高盐腌制食品"],
                      "diet_principles": [text] if text else []
                  }

              if "exercise_plan" not in plan and "exercise_principle" in plan:
                  text = _text(plan.get("exercise_principle"))
                  plan["exercise_plan"] = {
                      "exercise_type": "低强度有氧运动，如散步、太极拳、八段锦或坐姿上肢操",
                      "frequency": "每周 5-7 天",
                      "duration": "每次 20-30 分钟",
                      "intensity": "低至中等强度，以能正常交谈、不气喘为宜",
                      "precautions": [text] if text else ["运动中如出现胸闷、头晕、心悸，应立即停止并及时就医"]
                  }

              if "work_rest_plan" not in plan and isinstance(plan.get("daily_routine"), dict):
                  routine = plan.get("daily_routine") or {}
                  plan["work_rest_plan"] = {
                      "sleep": _text(routine.get("sleep")),
                      "water": _text(routine.get("water")),
                      "sedentary_reminder": _text(routine.get("sedentary_reminder")),
                      "glucose_monitoring": _text(routine.get("glucose_monitoring"))
                  }

          def main(llm_output: str, user_id: str, plan_days: int = 7, input_summary: str = "") -> dict:
              cleaned = _strip_to_json(llm_output)
              try:
                  plan = json.loads(cleaned)
                  if not isinstance(plan, dict):
                      raise ValueError("root is not object")
              except Exception:
                  return {
                      "success": False,
                      "user_id": user_id,
                      "error_message": "AI 输出不是合法 JSON，请重新生成",
                      "input_summary": input_summary,
                      "missing_fields": [],
                      "plan_result": {}
                  }

              try:
                  plan_days = int(plan_days or 7)
              except Exception:
                  plan_days = 7
              plan_days = max(1, min(plan_days, 30))

              _normalize_aliases(plan)

              defaults = {
                  "plan_title": "个性化控糖生活方案",
                  "user_id": user_id,
                  "plan_days": plan_days,
                  "risk_summary": "根据用户数据存在糖尿病相关风险倾向，建议结合线下检查结果持续管理。",
                  "diet_plan": {
                      "breakfast": "",
                      "lunch": "",
                      "dinner": "",
                      "snack": "",
                      "avoid_foods": [],
                      "diet_principles": []
                  },
                  "exercise_plan": {
                      "exercise_type": "",
                      "frequency": "",
                      "duration": "",
                      "intensity": "",
                      "precautions": []
                  },
                  "work_rest_plan": {
                      "sleep": "",
                      "water": "",
                      "sedentary_reminder": "",
                      "glucose_monitoring": ""
                  },
                  "daily_schedule": [],
                  "checkin_tasks": [
                      {
                          "task_type": "diet",
                          "task_name": "饮食打卡",
                          "description": "记录今日饮食是否符合控糖方案",
                          "default_status": "未完成"
                      },
                      {
                          "task_type": "exercise",
                          "task_name": "运动打卡",
                          "description": "记录今日是否完成推荐运动",
                          "default_status": "未完成"
                      }
                  ],
                  "health_tips": [],
                  "medical_warning": DEFAULT_WARNING,
                  "summary": ""
              }

              missing = []
              for field in REQUIRED_FIELDS:
                  if field not in plan or plan[field] in [None, ""]:
                      missing.append(field)
                      plan[field] = defaults[field]

              plan["user_id"] = str(plan.get("user_id") or user_id)
              try:
                  plan["plan_days"] = max(1, min(int(plan.get("plan_days") or plan_days), 30))
              except Exception:
                  plan["plan_days"] = plan_days
              plan["daily_schedule"] = _ensure_list(plan.get("daily_schedule"))
              plan["checkin_tasks"] = _normalize_checkin_tasks(plan.get("checkin_tasks"))
              plan["health_tips"] = _ensure_list(plan.get("health_tips"))
              if not str(plan.get("medical_warning", "")).strip():
                  plan["medical_warning"] = DEFAULT_WARNING

              if not isinstance(plan.get("diet_plan"), dict):
                  plan["diet_plan"] = defaults["diet_plan"]
              if not isinstance(plan.get("exercise_plan"), dict):
                  plan["exercise_plan"] = defaults["exercise_plan"]
              if not isinstance(plan.get("work_rest_plan"), dict):
                  plan["work_rest_plan"] = defaults["work_rest_plan"]

              diet_plan = plan.get("diet_plan") or {}
              exercise_plan = plan.get("exercise_plan") or {}
              work_rest_plan = plan.get("work_rest_plan") or {}

              if not _has_text(diet_plan.get("breakfast")):
                  diet_plan["breakfast"] = "早餐建议选择全谷物主食、鸡蛋或豆制品等优质蛋白，并搭配蔬菜。"
              if not _has_text(diet_plan.get("lunch")):
                  diet_plan["lunch"] = "午餐建议控制主食分量，搭配瘦肉、鱼虾或豆制品，并保证蔬菜摄入。"
              if not _has_text(diet_plan.get("dinner")):
                  diet_plan["dinner"] = "晚餐建议清淡少油，避免过量主食和高糖食物。"
              if not _has_text(diet_plan.get("snack")):
                  diet_plan["snack"] = "加餐可选择无糖酸奶、低糖水果或少量原味坚果。"
              diet_plan["avoid_foods"] = _ensure_list(diet_plan.get("avoid_foods")) or ["含糖饮料", "甜点", "油炸食品", "高盐腌制食品"]
              diet_plan["diet_principles"] = _ensure_list(diet_plan.get("diet_principles")) or ["主食粗细搭配并控制总量", "每餐搭配优质蛋白和蔬菜", "少油少盐，避免含糖饮料和甜食"]

              if not _has_text(exercise_plan.get("exercise_type")):
                  exercise_plan["exercise_type"] = "散步、太极拳、八段锦或坐姿上肢操等低强度运动"
              if not _has_text(exercise_plan.get("frequency")):
                  exercise_plan["frequency"] = "每周 5-7 天"
              if not _has_text(exercise_plan.get("duration")):
                  exercise_plan["duration"] = "每次 20-30 分钟"
              if not _has_text(exercise_plan.get("intensity")):
                  exercise_plan["intensity"] = "低至中等强度，以能正常交谈、不气喘为宜"
              exercise_plan["precautions"] = _ensure_list(exercise_plan.get("precautions")) or ["运动前热身，运动后放松", "如出现胸闷、头晕、心悸，应立即停止并及时就医"]

              if not _has_text(work_rest_plan.get("sleep")):
                  work_rest_plan["sleep"] = "建议保持规律作息，尽量保证 7-8 小时睡眠。"
              if not _has_text(work_rest_plan.get("water")):
                  work_rest_plan["water"] = "建议少量多次饮水，避免含糖饮料。"
              if not _has_text(work_rest_plan.get("sedentary_reminder")):
                  work_rest_plan["sedentary_reminder"] = "每久坐 45-60 分钟起身活动 3-5 分钟。"
              if not _has_text(work_rest_plan.get("glucose_monitoring")):
                  work_rest_plan["glucose_monitoring"] = "建议按医嘱或健康管理计划记录空腹及餐后血糖。"

              plan["diet_plan"] = diet_plan
              plan["exercise_plan"] = exercise_plan
              plan["work_rest_plan"] = work_rest_plan

              if not plan["health_tips"]:
                  plan["health_tips"] = ["记录饮食、运动和血糖变化", "避免突然增加运动强度", "血糖或血压持续异常时及时线下复查"]
              if not _has_text(plan.get("summary")):
                  plan["summary"] = "本方案围绕控糖、减重和改善生活习惯制定，重点是规律饮食、保守运动、规律作息和持续监测。"

              expected_days = set(range(1, plan["plan_days"] + 1))
              actual_days = set()
              normalized_schedule = []
              for item in plan["daily_schedule"]:
                  if not isinstance(item, dict):
                      continue
                  try:
                      day_num = int(item.get("day"))
                  except Exception:
                      continue
                  item["day"] = day_num
                  item["time"] = _text(item.get("time"))
                  item["task"] = _text(item.get("task"))
                  item["content"] = _text(item.get("content"))
                  if not item["time"] or not item["task"] or not item["content"]:
                      continue
                  actual_days.add(day_num)
                  normalized_schedule.append(item)
              plan["daily_schedule"] = normalized_schedule

              missing_days = sorted(expected_days - actual_days)
              if missing_days:
                  return {
                      "success": False,
                      "user_id": user_id,
                      "error_message": "daily_schedule 未覆盖完整计划天数，缺少 day: " + ", ".join(str(x) for x in missing_days),
                      "input_summary": input_summary,
                      "missing_fields": ["daily_schedule"],
                      "plan_result": {}
                  }

              critical_empty = []
              if _is_blank(plan.get("risk_summary")):
                  critical_empty.append("risk_summary")
              if _is_blank(plan.get("diet_plan")):
                  critical_empty.append("diet_plan")
              if _is_blank(plan.get("exercise_plan")):
                  critical_empty.append("exercise_plan")
              if _is_blank(plan.get("work_rest_plan")):
                  critical_empty.append("work_rest_plan")
              if _is_blank(plan.get("checkin_tasks")):
                  critical_empty.append("checkin_tasks")
              if _is_blank(plan.get("summary")):
                  critical_empty.append("summary")
              if critical_empty:
                  return {
                      "success": False,
                      "user_id": user_id,
                      "error_message": "AI 输出 JSON 字段结构不完整，缺少或为空: " + ", ".join(critical_empty),
                      "input_summary": input_summary,
                      "missing_fields": critical_empty,
                      "plan_result": {}
                  }

              return {
                  "success": True,
                  "user_id": user_id,
                  "error_message": "",
                  "input_summary": input_summary,
                  "missing_fields": [],
                  "plan_result": plan
              }

    - data:
        code: |
          import json

          def _parse_json(raw, default, field_name, errors):
              if raw is None or str(raw).strip() == "":
                  return default
              try:
                  value = json.loads(raw) if isinstance(raw, str) else raw
                  if isinstance(default, list) and not isinstance(value, list):
                      errors.append(f"{field_name} 必须是 JSON 数组")
                      return default
                  if isinstance(default, dict) and not isinstance(value, dict):
                      errors.append(f"{field_name} 必须是 JSON 对象")
                      return default
                  return value
              except Exception:
                  errors.append(f"{field_name} 不是合法 JSON")
                  return default

          def _to_int(value, default=0):
              try:
                  if value is None or value == "":
                      return default
                  return int(float(value))
              except Exception:
                  return default

          def _to_rate(value):
              try:
                  if value is None or value == "":
                      return None
                  return round(float(value), 2)
              except Exception:
                  return None

          def _status_count(records, status):
              return len([item for item in records if isinstance(item, dict) and status in [item.get("diet"), item.get("exercise"), item.get("diet_status"), item.get("exercise_status")]])

          def main(user_id: str = "",
                   user_profile: str = "",
                   latest_health_data: str = "",
                   risk_result: str = "",
                   life_plan: str = "",
                   plan_title: str = "",
                   plan_goal: str = "",
                   plan_tasks_json: str = "",
                   checkin_records: str = "",
                   checkin_stats_json: str = "",
                   checkin_trend_json: str = "",
                   task_breakdown_json: str = "",
                   diet_completion_count = 0,
                   exercise_completion_count = 0,
                   total_days = 0,
                   completion_rate = None,
                   start_date: str = "",
                   end_date: str = "",
                   user_notes: str = "",
                   safety_rules: str = "") -> dict:
              errors = []
              records = _parse_json(checkin_records, [], "checkin_records", errors)
              stats = _parse_json(checkin_stats_json, {}, "checkin_stats_json", errors)
              trend = _parse_json(checkin_trend_json, [], "checkin_trend_json", errors)
              task_breakdown = _parse_json(task_breakdown_json, {}, "task_breakdown_json", errors)
              plan_tasks = _parse_json(plan_tasks_json, [], "plan_tasks_json", errors)

              days = _to_int(total_days, _to_int(stats.get("total_days"), 0))
              diet_count = _to_int(diet_completion_count, _to_int(stats.get("diet_completion_count"), 0))
              exercise_count = _to_int(exercise_completion_count, _to_int(stats.get("exercise_completion_count"), 0))
              backend_rate = _to_rate(completion_rate)

              total_task_count = _to_int(stats.get("total_task_count"), 0)
              completed_task_count = _to_int(stats.get("completed_task_count"), 0)
              if total_task_count <= 0:
                  total_task_count = max(len(records), days * 2)
              if completed_task_count <= 0:
                  completed_task_count = diet_count + exercise_count
              if backend_rate is None:
                  completion_rate_value = 0 if total_task_count <= 0 else round(completed_task_count / total_task_count * 100, 2)
              else:
                  completion_rate_value = backend_rate

              record_count = len(records)
              trend_days = len(trend)
              missing_days = max(0, days - trend_days)
              completed_dates = []
              weak_dates = []
              for item in trend:
                  if not isinstance(item, dict):
                      continue
                  completed = _to_int(item.get("completed_count"), 0)
                  date = str(item.get("date") or "")
                  if completed >= 2 and date:
                      completed_dates.append(date)
                  if completed == 0 and date:
                      weak_dates.append(date)

              data_sufficiency = "enough"
              missing_fields = []
              if not user_profile or user_profile == "No data":
                  missing_fields.append("user_profile")
              if not records:
                  missing_fields.append("checkin_records")
              if days < 3 or record_count < 3:
                  data_sufficiency = "insufficient"
              can_analyze = len(errors) == 0 and len(missing_fields) == 0

              if errors:
                  error_message = "；".join(errors)
              elif missing_fields:
                  error_message = "打卡分析缺少必要数据：" + "、".join(missing_fields)
              else:
                  error_message = ""

              risk_flags = []
              risk_text = str(risk_result or "")
              latest_text = str(latest_health_data or "")
              if any(word in risk_text for word in ["高风险", "偏高", "high", "High"]):
                  risk_flags.append("风险结果提示需更谨慎控制饮食和运动强度")
              if any(word in latest_text for word in ["高血糖", "偏高", "低血糖", "异常"]):
                  risk_flags.append("最近健康数据存在异常或波动，需要提醒复查")

              normalized_context = {
                  "user_id": user_id,
                  "period": {
                      "start_date": start_date,
                      "end_date": end_date,
                      "total_days": days
                  },
                  "user_profile": user_profile,
                  "latest_health_data": latest_health_data,
                  "risk_result": risk_result,
                  "life_plan": {
                      "title": plan_title,
                      "goal": plan_goal,
                      "summary": life_plan,
                      "checkin_tasks": plan_tasks
                  },
                  "checkin": {
                      "records": records,
                      "trend": trend,
                      "stats": stats,
                      "task_breakdown": task_breakdown,
                      "completion_rate": completion_rate_value,
                      "diet_completion_count": diet_count,
                      "exercise_completion_count": exercise_count,
                      "total_task_count": total_task_count,
                      "completed_task_count": completed_task_count,
                      "completed_dates": completed_dates,
                      "weak_dates": weak_dates,
                      "missing_trend_days": missing_days
                  },
                  "user_notes": user_notes,
                  "risk_flags": risk_flags,
                  "safety_rules": safety_rules or "仅做健康管理建议，不替代医生诊断。"
              }

              input_summary = {
                  "user_id": user_id,
                  "start_date": start_date,
                  "end_date": end_date,
                  "total_days": days,
                  "record_count": record_count,
                  "completion_rate": completion_rate_value,
                  "diet_completion_count": diet_count,
                  "exercise_completion_count": exercise_count,
                  "data_sufficiency": data_sufficiency,
                  "weak_dates": weak_dates[:5],
                  "risk_flags": risk_flags
              }

              return {
                  "can_analyze": can_analyze,
                  "error_message": error_message,
                  "missing_fields": missing_fields,
                  "normalized_context": json.dumps(normalized_context, ensure_ascii=False, indent=2),
                  "input_summary": json.dumps(input_summary, ensure_ascii=False),
                  "completion_rate": completion_rate_value,
                  "data_sufficiency": data_sufficiency,
                  "data_sufficiency_text": "打卡数据较少，分析仅供参考" if data_sufficiency == "insufficient" else "打卡数据量基本满足本周期分析",
                  "weak_dates": weak_dates,
                  "risk_flags": risk_flags
              }
        code_language: python3
        desc: 解析 JSON 输入，校验必要字段，统一计算完成率、数据充分性、薄弱日期和安全提示，生成 LLM 可用上下文。

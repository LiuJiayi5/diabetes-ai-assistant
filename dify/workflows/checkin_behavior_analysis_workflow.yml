    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 使用 DeepSeek 模型生成结构化的生活打卡行为分析 JSON。
        memory:
          enabled: false
          window:
            enabled: false
            size: 50
        model:
          completion_params:
            temperature: 0.25
          mode: chat
          name: deepseek-chat
          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: system-prompt
          role: system
          text: |
            你是“糖尿病预防智能助手”的生活打卡行为分析工作流，负责把用户的健康档案、风险评估、生活方案、打卡记录和趋势统计整理成可保存到系统中的 JSON 分析结果。

            边界规则：
            1. 你不是医生，不能给出最终医学诊断、处方或药物剂量建议。
            2. 如发现持续高血糖、疑似低血糖、胸闷胸痛、明显不适或指标显著异常，只能建议用户线下就医或复查。
            3. 必须同时分析饮食打卡和运动打卡，不能只泛泛评价。
            4. 必须结合当前生活方案目标和打卡任务，判断用户是否按方案执行。
            5. 建议必须具体、温和、可执行，避免“继续保持”“注意饮食”这类空话。
            6. 如果数据充分性为 insufficient，必须明确说明“打卡数据较少，分析仅供参考”，并避免过度下结论。
            7. 只输出合法 JSON 对象，不要输出 Markdown、代码块或 JSON 之外的解释文字。
        - id: user-prompt
          role: user
          text: |
            请根据以下标准化上下文生成本周期生活打卡行为分析。

            标准化上下文：
            {{#validate_and_normalize_input.normalized_context#}}

            数据充分性：
            {{#validate_and_normalize_input.data_sufficiency_text#}}

            风险提示：
            {{#validate_and_normalize_input.risk_flags#}}

            输出字段必须严格如下：
            {
              "completion_rate": 数字,
              "diet_summary": "饮食打卡完成情况总结，包含完成频率、薄弱日期或薄弱行为",
              "exercise_summary": "运动打卡完成情况总结，包含完成频率、薄弱日期或薄弱行为",
              "habit_score": 数字,
              "life_evaluation": "结合方案目标、风险信息和实际打卡的生活状态评价",
              "main_problems": ["主要问题1", "主要问题2"],
              "improvement_suggestions": ["改进建议1", "改进建议2", "改进建议3"],
              "next_focus": "下一阶段最需要关注的一件事或一组行动",
              "summary": "整体总结"
            }

            字段规则：
            1. completion_rate 必须等于 {{#validate_and_normalize_input.completion_rate#}}。
            2. habit_score 必须是 0 到 100 的整数，综合完成率、连续性、饮食运动均衡度、风险提示和备注给出。
            3. main_problems 至少 2 条，最多 4 条；如果表现较好，也要写成“仍需关注的点”。
            4. improvement_suggestions 至少 3 条，最多 5 条，每条要能直接执行。
            5. 饮食建议要尽量具体到主食比例、烹饪方式、加餐或晚餐控制。
            6. 运动建议要尽量具体到饭后步行、频率、时长、强度或不适时停止。
            7. summary 适合展示在页面摘要区，控制在 80 字以内。

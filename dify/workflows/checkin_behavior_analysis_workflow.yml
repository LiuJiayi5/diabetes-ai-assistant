    - data:
        code: |
          import json

          REQUIRED_FIELDS = [
              "completion_rate",
              "diet_summary",
              "exercise_summary",
              "habit_score",
              "life_evaluation",
              "main_problems",
              "improvement_suggestions",
              "next_focus",
              "summary"
          ]

          def _strip_to_json(text):
              if text is None:
                  return ""
              value = str(text).strip()
              if value.startswith("```"):
                  value = value.strip("`")
                  if value.lower().startswith("json"):
                      value = value[4:].strip()
              start = value.find("{")
              end = value.rfind("}")
              if start >= 0 and end > start:
                  return value[start:end + 1]
              return value

          def _ensure_list(value):
              if value is None:
                  return []
              if isinstance(value, list):
                  return [str(item).strip() for item in value if str(item).strip()]
              text = str(value).strip()
              return [text] if text else []

          def _to_rate(value):
              try:
                  return round(float(value), 2)
              except Exception:
                  return 0

          def _to_score(value, fallback):
              try:
                  score = int(round(float(value)))
              except Exception:
                  score = fallback
              return max(0, min(100, score))

          def main(llm_output: str,
                   completion_rate = 0,
                   data_sufficiency: str = "",
                   input_summary: str = "") -> dict:
              expected_rate = _to_rate(completion_rate)
              try:
                  analysis = json.loads(_strip_to_json(llm_output))
                  if not isinstance(analysis, dict):
                      raise ValueError("root is not object")
              except Exception:
                  return {
                      "success": False,
                      "error_message": "AI 输出不是合法 JSON，请重新生成",
                      "missing_fields": [],
                      "input_summary": input_summary,
                      "analysis_result": ""
                  }

              missing = []
              for field in REQUIRED_FIELDS:
                  if field not in analysis or analysis[field] in [None, ""]:
                      missing.append(field)

              analysis["completion_rate"] = expected_rate
              analysis["main_problems"] = _ensure_list(analysis.get("main_problems"))
              analysis["improvement_suggestions"] = _ensure_list(analysis.get("improvement_suggestions"))

              if len(analysis["main_problems"]) < 2:
                  missing.append("main_problems")
                  while len(analysis["main_problems"]) < 2:
                      analysis["main_problems"].append("打卡数据维度仍需继续积累，便于后续判断习惯稳定性")
              if len(analysis["improvement_suggestions"]) < 3:
                  missing.append("improvement_suggestions")
                  defaults = [
                      "接下来一周继续完成饮食和运动打卡，优先保证记录完整",
                      "晚餐主食控制在平时的三分之二，并搭配足量蔬菜和优质蛋白",
                      "餐后选择舒适强度步行 15 到 20 分钟，如有不适立即停止"
                  ]
                  for item in defaults:
                      if len(analysis["improvement_suggestions"]) >= 3:
                          break
                      analysis["improvement_suggestions"].append(item)

              analysis["habit_score"] = _to_score(analysis.get("habit_score"), int(max(40, min(90, expected_rate))))
              if not str(analysis.get("diet_summary", "")).strip():
                  analysis["diet_summary"] = "本周期饮食打卡信息不足，建议继续记录主食、蔬菜、蛋白质和加餐情况。"
              if not str(analysis.get("exercise_summary", "")).strip():
                  analysis["exercise_summary"] = "本周期运动打卡信息不足，建议继续记录餐后活动、运动时长和身体感受。"
              if not str(analysis.get("life_evaluation", "")).strip():
                  analysis["life_evaluation"] = "当前分析基于生活方案和打卡记录生成，仅用于健康管理参考。"
              if not str(analysis.get("next_focus", "")).strip():
                  analysis["next_focus"] = "下一阶段优先提升饮食和运动打卡的连续性。"
              if not str(analysis.get("summary", "")).strip():
                  analysis["summary"] = "本周期打卡分析已生成，请结合页面详情查看具体建议。"

              if data_sufficiency == "insufficient" and "打卡数据较少" not in analysis["summary"]:
                  analysis["summary"] = "打卡数据较少，分析仅供参考。" + analysis["summary"]

              return {
                  "success": True,
                  "error_message": "",
                  "missing_fields": [],
                  "input_summary": input_summary,
                  "analysis_result": json.dumps(analysis, ensure_ascii=False)
              }

    - data:
        code: "import json\n\nDEFAULT_WARNING = \"本次调整仅用于生活方式管理建议，不能替代线下医生诊断或治疗。\"\
          \n\ndef _json_text(text):\n    text = (text or \"\").strip()\n    think_end\
          \ = text.rfind(\"</think>\")\n    if think_end >= 0:\n        text = text[think_end\
          \ + len(\"</think>\"):].strip()\n    candidates = []\n    start = text.find(\"\
          {\")\n    while start >= 0 and start < len(text):\n        end = _find_matching_brace(text,\
          \ start)\n        if end > start:\n            candidates.append(text[start:end\
          \ + 1])\n        start = text.find(\"{\", start + 1)\n    fallback = None\n\
          \    for candidate in reversed(candidates):\n        try:\n            parsed\
          \ = json.loads(candidate)\n            if fallback is None:\n          \
          \      fallback = candidate\n            if isinstance(parsed, dict) and\
          \ (\n                \"intervention_level\" in parsed\n                or\
          \ \"review_result\" in parsed\n                or (\"success\" in parsed\
          \ and \"adherence_score\" in parsed)\n            ):\n                return\
          \ candidate\n        except Exception:\n            pass\n    if fallback\
          \ is not None:\n        return fallback\n    return text\n\ndef _find_matching_brace(text,\
          \ start):\n    depth = 0\n    in_string = False\n    escaped = False\n \
          \   for index in range(start, len(text)):\n        current = text[index]\n\
          \        if escaped:\n            escaped = False\n            continue\n\
          \        if current == \"\\\\\":\n            escaped = True\n         \
          \   continue\n        if current == '\"':\n            in_string = not in_string\n\
          \            continue\n        if in_string:\n            continue\n   \
          \     if current == \"{\":\n            depth += 1\n        elif current\
          \ == \"}\":\n            depth -= 1\n            if depth == 0:\n      \
          \          return index\n    return -1\n\ndef _list(value):\n    if isinstance(value,\
          \ list):\n        return value\n    if value in [None, \"\"]:\n        return\
          \ []\n    return [str(value)]\n\ndef _text(value, limit=500):\n    if value\
          \ in [None, \"\"]:\n        return \"\"\n    if isinstance(value, str):\n\
          \        text = value\n    else:\n        try:\n            text = json.dumps(value,\
          \ ensure_ascii=False, separators=(\",\", \":\"))\n        except Exception:\n\
          \            text = str(value)\n    text = text.strip()\n    return text[:limit]\n\
          \ndef _shallow_patch(value):\n    if not isinstance(value, dict):\n    \
          \    return {}\n    days = value.get(\"daily_schedule\")\n    if not isinstance(days,\
          \ list):\n        return {}\n    result_days = []\n    for item in days:\n\
          \        if not isinstance(item, dict):\n            continue\n        day\
          \ = item.get(\"day\")\n        if day in [None, \"\"]:\n            continue\n\
          \        shallow = {\"day\": day}\n        for key in [\"title\", \"theme\"\
          , \"goal\", \"reminder\", \"diet_plan\", \"exercise_plan\", \"meals\"]:\n\
          \            if key in item:\n                shallow[key] = _text(item.get(key))\n\
          \        result_days.append(shallow)\n    return {\"daily_schedule\": result_days}\
          \ if result_days else {}\n\ndef main(llm_output: str) -> dict:\n    try:\n\
          \        result = json.loads(_json_text(llm_output))\n        if not isinstance(result,\
          \ dict):\n            raise ValueError(\"root is not object\")\n    except\
          \ Exception as exc:\n        result = {\n            \"success\": False,\n\
          \            \"error_message\": \"intervention review output is not valid\
          \ JSON: \" + str(exc)\n        }\n\n    result[\"success\"] = bool(result.get(\"\
          success\", True))\n    result[\"adherence_score\"] = int(result.get(\"adherence_score\"\
          ) or 0)\n    level = result.get(\"intervention_level\") or \"observe\"\n\
          \    if level not in [\"observe\", \"minor_adjustment\", \"moderate_adjustment\"\
          , \"high_risk_alert\"]:\n        level = \"observe\"\n    result[\"intervention_level\"\
          ] = level\n    result[\"should_update_plan\"] = bool(result.get(\"should_update_plan\"\
          )) and level != \"high_risk_alert\"\n    result[\"update_scope\"] = result.get(\"\
          update_scope\") or (\"future_days\" if result[\"should_update_plan\"] else\
          \ \"none\")\n    result[\"affected_days\"] = _list(result.get(\"affected_days\"\
          ))\n    result[\"main_problem_tags\"] = _list(result.get(\"main_problem_tags\"\
          ))\n    result[\"preserved_items\"] = _list(result.get(\"preserved_items\"\
          ))\n    result[\"changed_items\"] = _list(result.get(\"changed_items\"))\n\
          \    result[\"adjustment_strategy\"] = result.get(\"adjustment_strategy\"\
          ) or \"继续观察当前方案执行情况。\"\n    result[\"patient_notice\"] = result.get(\"patient_notice\"\
          ) or \"系统已完成本次执行复盘。\"\n    result[\"explanation\"] = result.get(\"explanation\"\
          ) or \"系统根据近期打卡和健康数据完成自动判断。\"\n    result[\"safety_warning\"] = result.get(\"\
          safety_warning\") or DEFAULT_WARNING\n    result[\"adjusted_plan_patch\"\
          ] = _shallow_patch(result.get(\"adjusted_plan_patch\"))\n\n    return {\n\
          \        \"success\": result[\"success\"],\n        \"review_result\": result,\n\
          \        \"error_message\": result.get(\"error_message\", \"\")\n    }\n"
        code_language: python3

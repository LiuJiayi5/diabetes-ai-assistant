    - data:
        code: "import json\n\ndef _trim(text, limit=900):\n    text = (text or \"\"\
          ).strip()\n    if len(text) <= limit:\n        return text\n    return text[:limit]\
          \ + \"...\"\n\ndef _json_summary(text, limit=900):\n    text = (text or\
          \ \"\").strip()\n    if not text:\n        return \"\"\n    try:\n     \
          \   value = json.loads(text)\n        text = json.dumps(value, ensure_ascii=False,\
          \ separators=(\",\", \":\"))\n    except Exception:\n        pass\n    return\
          \ _trim(text, limit)\n\ndef main(\n    trigger_type: str,\n    trigger_reason:\
          \ str,\n    latest_health_metrics_json: str,\n    latest_risk_assessment_json:\
          \ str,\n    checkin_stats_json: str,\n    latest_checkin_analysis_json:\
          \ str,\n    plan_goal: str\n) -> dict:\n    parts = [\n        \"糖尿病生活方式干预、饮食餐盘法、碳水化合物升糖风险、运动建议与运动禁忌、血糖监测、高血糖低血糖处理、并发症预防、体重血压血脂睡眠心理管理。\"\
          ,\n        \"请检索可用于判断生活方案是否维持、调整、提醒复查或线下就医的专业依据。\",\n        \"重点关注：饮食结构、晚餐主食、运动完成率、低血糖风险、高血糖风险、血压异常、依从性不足、未来计划调整边界。\"\
          \n    ]\n\n    if plan_goal:\n        parts.append(\"方案目标：\" + _trim(plan_goal,\
          \ 120))\n    if trigger_type or trigger_reason:\n        parts.append(\"\
          触发场景：\" + _trim((trigger_type or \"\") + \" \" + (trigger_reason or \"\"\
          ), 240))\n\n    metrics = _json_summary(latest_health_metrics_json)\n  \
          \  if metrics:\n        parts.append(\"最新健康数据：\" + metrics)\n\n    risk\
          \ = _json_summary(latest_risk_assessment_json)\n    if risk:\n        parts.append(\"\
          最新风险评估：\" + risk)\n\n    stats = _json_summary(checkin_stats_json)\n   \
          \ if stats:\n        parts.append(\"近期打卡统计：\" + stats)\n\n    analysis =\
          \ _json_summary(latest_checkin_analysis_json)\n    if analysis:\n      \
          \  parts.append(\"最近打卡分析：\" + analysis)\n\n    return {\"retrieval_query\"\
          : \"\\n\".join(parts)[:2400]}\n"
        code_language: python3

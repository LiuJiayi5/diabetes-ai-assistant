    - data:
        code: |
          import json

          def _parse(raw, default, name, errors):
              if raw is None or str(raw).strip() == "":
                  return default
              try:
                  value = json.loads(raw)
                  return value
              except Exception:
                  errors.append(name + " 不是合法 JSON")
                  return default

          def _num(value, default=0):
              try:
                  return float(value)
              except Exception:
                  return default

          def _brief(value, limit=1200):
              text = json.dumps(value, ensure_ascii=False)
              return text[:limit]

          def main(user_id: str,
                   report_type: str = "personal",
                   period_days: int = 30,
                   user_profile_json: str = "{}",
                   latest_metrics_json: str = "{}",
                   metrics_json: str = "[]",
                   risk_assessment_json: str = "{}",
                   life_plan_json: str = "{}",
                   checkin_analysis_json: str = "{}",
                   checkin_records_json: str = "[]",
                   ai_chat_summary: str = "",
                   missing_items: str = "",
                   safety_rules: str = "") -> dict:
              errors = []
              profile = _parse(user_profile_json, {}, "user_profile_json", errors)
              latest = _parse(latest_metrics_json, {}, "latest_metrics_json", errors)
              metrics = _parse(metrics_json, [], "metrics_json", errors)
              risk = _parse(risk_assessment_json, {}, "risk_assessment_json", errors)
              life_plan = _parse(life_plan_json, {}, "life_plan_json", errors)
              checkin_analysis = _parse(checkin_analysis_json, {}, "checkin_analysis_json", errors)
              checkins = _parse(checkin_records_json, [], "checkin_records_json", errors)

              if not isinstance(metrics, list):
                  errors.append("metrics_json 必须是数组")
                  metrics = []
              if not isinstance(checkins, list):
                  errors.append("checkin_records_json 必须是数组")
                  checkins = []

              missing_fields = []
              if not user_id:
                  missing_fields.append("user_id")
              if not profile:
                  missing_fields.append("user_profile_json")
              if not latest:
                  missing_fields.append("latest_metrics_json")
              if not risk:
                  missing_fields.append("risk_assessment_json")

              try:
                  period_days = int(period_days or 30)
              except Exception:
                  period_days = 30
              period_days = max(7, min(period_days, 90))

              fasting = _num(latest.get("fastingGlucose") or latest.get("fasting_glucose"))
              post = _num(latest.get("postprandialGlucose") or latest.get("postprandial_glucose"))
              hba1c = _num(latest.get("hba1c"))
              sbp = _num(latest.get("systolicBp") or latest.get("systolic_bp"))
              dbp = _num(latest.get("diastolicBp") or latest.get("diastolic_bp"))

              safety_flags = []
              if fasting >= 7.0:
                  safety_flags.append("空腹血糖偏高，建议线下复查")
              if post >= 11.1:
                  safety_flags.append("餐后血糖明显偏高，建议线下复查")
              if hba1c >= 6.5:
                  safety_flags.append("HbA1c 偏高，建议结合医生意见评估")
              if sbp >= 140 or dbp >= 90:
                  safety_flags.append("血压偏高，运动建议需保守")

              normalized_context = {
                  "user_id": user_id,
                  "report_type": report_type or "personal",
                  "period_days": period_days,
                  "profile": profile,
                  "latest_metrics": latest,
                  "metrics_count": len(metrics),
                  "risk_assessment": risk,
                  "life_plan": life_plan,
                  "checkin_analysis": checkin_analysis,
                  "checkin_count": len(checkins),
                  "ai_chat_summary": ai_chat_summary,
                  "missing_items": missing_items,
                  "safety_rules": safety_rules,
                  "safety_flags": safety_flags
              }

              can_generate = len(errors) == 0 and len(missing_fields) == 0
              error_message = ""
              if errors:
                  error_message = "；".join(errors)
              elif missing_fields:
                  error_message = "综合报告缺少必要上下文：" + "、".join(missing_fields)

              return {
                  "can_generate": can_generate,
                  "user_id": user_id,
                  "report_type": report_type or "personal",
                  "period_days": period_days,
                  "normalized_context": json.dumps(normalized_context, ensure_ascii=False),
                  "input_summary": "用户" + str(user_id) + "，报告周期" + str(period_days) + "天，指标" + str(len(metrics)) + "条，打卡" + str(len(checkins)) + "条，安全提示" + str(len(safety_flags)) + "项。",
                  "safety_flags": safety_flags,
                  "missing_fields": missing_fields,
                  "error_message": error_message
              }
        code_language: python3
        outputs:
          can_generate:
            type: boolean
          error_message:
            type: string
          input_summary:
            type: string
          missing_fields:
            type: array[string]
          normalized_context:
            type: string

    - data:
        code: |
          import json
          import re

          REQUIRED_TOP = [
              "patient_report",
              "doctor_report",
              "metric_trend",
              "evidence_chain",
              "data_gaps",
              "safety_warnings",
              "next_cycle_adjustment",
              "summary",
          ]

          def _strip(text):
              text = str(text or "").strip()
              text = re.sub(r"^```(?:json)?", "", text, flags=re.IGNORECASE).strip()
              text = re.sub(r"```$", "", text).strip()
              start = text.find("{")
              end = text.rfind("}")
              if start >= 0 and end > start:
                  return text[start:end + 1]
              return text

          def _list(value):
              if isinstance(value, list):
                  return value
              if value in [None, ""]:
                  return []
              return [str(value)]

          def _text(value):
              return str(value or "").strip()

          def main(llm_output: str, user_id: str, input_summary: str = "") -> dict:
              try:
                  report = json.loads(_strip(llm_output))
              except Exception:
                  return {
                      "success": False,
                      "user_id": user_id,
                      "error_message": "AI 输出不是合法 JSON，请重新生成",
                      "input_summary": input_summary,
                      "missing_fields": ["report_result"],
                      "report_result": "{}",
                      "summary": ""
                  }

              missing = [key for key in REQUIRED_TOP if key not in report or report.get(key) in [None, "", [], {}]]
              for key in ["key_findings", "today_action"]:
                  report.setdefault("patient_report", {}).setdefault(key, [])
                  report["patient_report"][key] = _list(report["patient_report"][key])
              for key in ["abnormal_indicators", "clinical_communication_points", "follow_up_suggestions"]:
                  report.setdefault("doctor_report", {}).setdefault(key, [])
                  report["doctor_report"][key] = _list(report["doctor_report"][key])
              report["evidence_chain"] = _list(report.get("evidence_chain"))
              report["data_gaps"] = _list(report.get("data_gaps"))
              report["safety_warnings"] = _list(report.get("safety_warnings"))

              if not _text(report.get("summary")):
                  missing.append("summary")
              if missing:
                  return {
                      "success": False,
                      "user_id": user_id,
                      "error_message": "AI 输出 JSON 字段结构不完整，缺少或为空: " + ", ".join(sorted(set(missing))),
                      "input_summary": input_summary,
                      "missing_fields": sorted(set(missing)),
                      "report_result": "{}",
                      "summary": ""
                  }

              return {
                  "success": True,
                  "user_id": user_id,
                  "error_message": "",
                  "input_summary": input_summary,
                  "missing_fields": [],
                  "report_result": json.dumps(report, ensure_ascii=False),
                  "summary": report.get("summary", "")
              }
        code_language: python3
        outputs:
          error_message:
            type: string

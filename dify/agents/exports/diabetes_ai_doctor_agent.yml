app:
  description: 糖尿病预治智能助手模块5：AI 医生咨询智能体。用于患者端糖尿病咨询、多轮对话、打卡分析解释和健康建议，不替代线下医生诊疗。
  icon: 🩺
  icon_background: '#E8F3FF'
  icon_type: emoji
  mode: agent-chat
  name: diabetes_ai_doctor_agent
  use_icon_as_answer_icon: true
dependencies: []
kind: app
version: 0.6.0
model_config:
  agent_mode:
    enabled: false
    strategy: router
    tools: []
  annotation_reply:
    enabled: false
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_configs:
    datasets:
      datasets: []
      strategy: router
    retrieval_model: single
  dataset_query_variable: null
  external_data_tools: []
  file_upload:
    image:
      detail: high
      enabled: false
      number_limits: 3
      transfer_methods:
      - remote_url
      - local_file
  model:
    completion_params:
      max_tokens: 1200
      stop: []
      temperature: 0.3
      top_p: 0.85
    mode: chat
    name: deepseek-chat
    provider: langgenius/deepseek/deepseek
  more_like_this:
    enabled: false
  opening_statement: 你好，我是糖尿病预治智能助手的 AI 医生咨询助手。你可以问我糖尿病基础知识、饮食运动建议、指标解读，或让我结合最近打卡分析帮你看看下一步怎么调整。
  pre_prompt: |
    你是“糖尿病预治智能助手”项目中的 AI 医生咨询智能体，面向患者用户提供糖尿病预防、控糖生活方式、指标解读和行为改进建议。

    你的身份与边界：
    1. 你不是线下真实医生，不能做最终诊断，不能替代医院就诊、复查或医生医嘱。
    2. 不要输出“你已经确诊糖尿病”“必须服用某药”等绝对诊断或处方结论。
    3. 涉及药物时，只能做常识性提醒，例如遵医嘱、不要自行加减药、注意低血糖风险；不要给具体处方、剂量或换药方案。
    4. 遇到明显严重症状或异常指标，例如持续高血糖、低血糖症状、胸痛、呼吸困难、意识异常、酮症风险、妊娠期明显异常等，应优先提示用户尽快线下就医或复查。
    5. 不编造用户没有提供的病史、用药、检查结果、健康档案、风险评估、生活方案或打卡数据。
    6. 如果上下文数据不足，要明确说明“目前信息不足”，再给一般性、安全、可执行的建议。

    回答风格：
    1. 使用简洁、自然、患者容易理解的中文。
    2. 先直接回答用户问题，再给 2 到 5 条可执行建议。
    3. 不要堆砌难懂医学术语；必要术语要顺手解释。
    4. 免责声明要短，不要每次输出冗长警告。
    5. 对非糖尿病、非健康生活相关问题，简短说明你的能力范围，并引导用户回到糖尿病预防、控糖、饮食、运动、指标解读、打卡分析等主题。

    你可以回答的主题：
    - 糖尿病基础知识，1 型、2 型、妊娠糖尿病等类型解释。
    - 控糖饮食原则，常见食物升糖风险，外食和加餐建议。
    - 运动建议，生活习惯建议，体重管理和作息建议。
    - 血糖、血压、BMI、腰围、糖化血红蛋白等健康指标解释。
    - 风险评估结果解释、个性化生活方案追问。
    - 生活打卡和行为分析结果解释。
    - 健康资讯内容解释。

    后端可能提供以下用户上下文。只能把它们作为辅助信息使用，不能把缺失数据当成已存在：
    - 安全规则：{{safety_rules}}
    - 用户基本信息：{{user_basic}}
    - 健康档案摘要：{{profile_summary}}
    - 最新健康数据：{{latest_health_data}}
    - 最近风险评估结果：{{risk_result}}
    - 当前生活方案摘要：{{life_plan}}
    - 最近生活打卡与行为分析上下文：{{checkin}}

    当用户询问“最近一周打卡分析”“完成率为什么不高”“饮食和运动打卡怎么改”“打卡分析建议是什么意思”等模块8相关问题时：
    1. 优先使用 {{checkin}} 中的最近记录、完成率、饮食完成情况、运动完成情况、生活评价、主要问题、改进建议和下一步重点。
    2. 如果 {{checkin}} 为空或显示暂无数据，不要假装看到了打卡记录；请说明目前没有足够打卡数据，并给出通用的记录与改进建议。
    3. 解释完成率时，要把它说成人能理解的生活行为连续性，不要只复述数字。
    4. 建议要小而具体，例如“先连续 3 天记录晚餐主食量”“饭后散步 15-20 分钟”“把含糖饮料换成无糖饮品”等。

    回答格式建议：
    - 普通咨询：直接回答 + 可执行建议 + 简短安全提醒。
    - 指标解释：指标含义 + 可能影响因素 + 下一步观察或就医建议。
    - 打卡分析解释：当前表现 + 主要卡点 + 接下来 3 个小目标。
    - 信息不足：说明缺少什么 + 先给通用安全建议。
  prompt_type: simple
  retriever_resource:
    enabled: true
  sensitive_word_avoidance:
    config: {}
    enabled: false
    type: ''
  speech_to_text:
    enabled: false
  suggested_questions:
  - 帮我解释一下最近一周打卡分析
  - 为什么我的完成率不高？
  - 根据我的饮食和运动打卡，我应该怎么改？
  - 空腹血糖偏高通常可能和什么有关？
  - 糖尿病人晚餐主食应该怎么安排？
  suggested_questions_after_answer:
    enabled: true
  text_to_speech:
    enabled: false
    language: ''
    voice: ''
  user_input_form:
  - paragraph:
      label: 安全规则
      max_length: 4000
      required: false
      variable: safety_rules
  - paragraph:
      label: 用户基本信息
      max_length: 4000
      required: false
      variable: user_basic
  - paragraph:
      label: 健康档案摘要
      max_length: 4000
      required: false
      variable: profile_summary
  - paragraph:
      label: 最新健康数据
      max_length: 4000
      required: false
      variable: latest_health_data
  - paragraph:
      label: 最近风险评估结果
      max_length: 4000
      required: false
      variable: risk_result
  - paragraph:
      label: 当前生活方案摘要
      max_length: 4000
      required: false
      variable: life_plan
  - paragraph:
      label: 最近生活打卡与行为分析上下文
      max_length: 8000
      required: false
      variable: checkin

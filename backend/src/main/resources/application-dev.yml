spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/diabetes_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:5MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:6MB}
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:465}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_AUTH_CODE:}
    protocol: ${SMTP_PROTOCOL:smtps}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: ${SMTP_PORT:465}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

dify:
  base-url: ${DIFY_BASE_URL:http://localhost/v1}
  risk-predict-api-key: ${DIFY_RISK_PREDICT_API_KEY:${DIFY_RISK_PREDICTION_API_KEY:your_risk_predict_api_key}}
  ai-doctor-api-key: ${DIFY_AI_DOCTOR_API_KEY:your_ai_doctor_api_key}
  life-plan-api-key: ${DIFY_LIFE_PLAN_API_KEY:your_life_plan_api_key}
  checkin-analysis-api-key: ${DIFY_CHECKIN_ANALYSIS_API_KEY:your_checkin_analysis_api_key}
  intervention-review-api-key: ${DIFY_INTERVENTION_REVIEW_API_KEY:your_intervention_review_api_key}
  comprehensive-report-api-key: ${DIFY_COMPREHENSIVE_REPORT_API_KEY:your_comprehensive_report_api_key}
  content-recommendation-api-key: ${DIFY_CONTENT_RECOMMENDATION_API_KEY:app-G8RhZNwQlonLasO7w8nZlq6q}

jwt:
  secret: ${JWT_SECRET:diabetes_assistant_dev_secret}
  expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

app:
  upload:
    root-dir: ${APP_UPLOAD_ROOT_DIR:uploads}
    max-image-size-mb: ${APP_UPLOAD_MAX_IMAGE_SIZE_MB:5}
